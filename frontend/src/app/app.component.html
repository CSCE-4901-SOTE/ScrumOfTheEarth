<!-- navbar -->
<header class="navbar" *ngIf="showNavbar">
  <!-- logo -->
  <div class="navbar-left">
    <img src="assets/dashfarmhouse.png" alt="Farmhouse Logo" class="logo" />
  </div>

  <!-- navigation -->
  <div class="navbar-center">
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/map-sensor" routerLinkActive="active">Map Sensor</a>
      <a routerLink="/alerts" routerLinkActive="active">Alert</a>
    </nav>
  </div>

  <!-- menu button -->
  <button class="menu-button" (click)="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- dropdown menu -->
  <div class="dropdown-menu" *ngIf="menuOpen">
    <div class="dropdown-header">
      <div class="user-info">
        <strong>{{ fullName || 'User' }}</strong><br />
        <small>{{ displayRole }}</small>
      </div>
    </div>

    <hr />

    <a routerLink="/edit-profile" (click)="closeMenu()">Edit Profile</a>
    <a routerLink="/contacts" (click)="closeMenu()">Contact</a>
    <a
      *ngIf="role?.toLowerCase() === 'farmer'"
      routerLink="/report-page"
      (click)="closeMenu()"
    >
      Report
    </a>
    <a routerLink="/login-page" (click)="closeMenu()">Sign Out</a>
  </div>
</header>

<router-outlet></router-outlet>
