<!-- navbar -->
<header class="navbar">
  <!-- logo -->
  <div class="navbar-left">
    <img src="assets/dashfarmhouse.png" alt="Farmhouse Logo" class="logo" />
  </div>

  <!-- navigation -->
  <div class="navbar-center">
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/map-sensor" routerLinkActive="active">Map Sensor</a>
      <a routerLink="/alert" routerLinkActive="active" style="position:relative">
        Alert
        <span *ngIf="unreadAlerts > 0" style="
          position:absolute; top:-6px; right:-10px;
          background:#e00e0e; color:#fff;
          font-size:10px; font-weight:700;
          border-radius:50%; min-width:16px; height:16px;
          display:inline-flex; align-items:center; justify-content:center;
          padding:0 3px; line-height:1;">{{ unreadAlerts }}</span>
      </a>
    </nav>
  </div>

  <!-- menu button -->
  <button class="menu-button" (click)="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- dropdown menu -->
  <div class="dropdown-menu" *ngIf="menuOpen" (click)="menuOpen = false">
    <div class="dropdown-header">
      <div class="user-icon">👤</div>
      <div class="user-info">
        <strong>{{ userName || 'User' }}</strong><br />
        <small>{{ role || '' }}</small>
      </div>
    </div>

    <hr />

    <a routerLink="/edit-profile">Edit Profile</a>
    <a href="#">Contact</a>
    <a href="#">Report</a>
    <a href="#">Sign Out</a>
  </div>
</header>
<router-outlet></router-outlet>
