<!-- navbar -->
<header class="navbar" *ngIf="showNavbar">
  <!-- logo -->
  <div class="navbar-left">
    <img src="assets/dashfarmhouse.png" alt="Farmhouse Logo" class="logo" />
  </div>

  <!-- navigation -->
  <div class="navbar-center">
    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/map-sensor" routerLinkActive="active">Map Sensor</a>
      <a routerLink="/alerts" routerLinkActive="active">
        Alert
        <span *ngIf="unreadAlerts > 0" style="
          position:absolute; top:-6px; right:-25px;
          background:#e00e0e; color:#fff;
          font-size:10px; font-weight:700;
          border-radius:50%; min-width:16px; height:16px;
          display:inline-flex; align-items:center; justify-content:center;
          padding:0 3px; line-height:1;">{{ unreadAlerts }}</span>
      </a>
    </nav>
  </div>

  <!--hamburger -->
  <button class="menu-button" (click)="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- dropdown menu -->
  <div class="dropdown-menu" *ngIf="menuOpen" (click)="menuOpen = false">
    <div class="dropdown-header">
      <img *ngIf="profileImage" [src]="profileImage" alt="Profile" class="dropdown-profile-pic" />
      <div *ngIf="!profileImage" class="dropdown-profile-placeholder">
        {{ (fullName?.charAt(0) || 'U').toUpperCase() }}
      </div>
      <div class="user-info">
        <strong>{{ fullName || 'User' }}</strong><br />
        <small>{{ displayRole }}</small>
      </div>
    </div>

    <hr />

    <a routerLink="/edit-profile" (click)="closeMenu()">Edit Profile</a>
    <a routerLink="/contacts" (click)="closeMenu()">Contact</a>
    <a
      *ngIf="role?.toLowerCase() === 'farmer'"
      routerLink="/report-page"
      (click)="closeMenu()"
    >
      Report
    </a>
    <a (click)="signOut()">Sign Out</a>
  </div>
</header>

<router-outlet></router-outlet>
