<div class="contacts-container">
  <div class="header-row">
    <h2>Contacts</h2>

    <button
      *ngIf="isTechnician"
      class="add-contact-btn"
      (click)="openAddModal()"
    >
      Add Contact
    </button>
  </div>

  <input
    class="search-box"
    type="text"
    placeholder="Search"
    [(ngModel)]="searchTerm"
  />

  <table class="contacts-table">
    <thead>
      <tr>
        <th *ngIf="isTechnician" class="checkbox-column"></th>
        <th>Name</th>
        <th>Phone Number</th>
        <th>Email</th>
        <th>{{ nodeColumnTitle }}</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of filteredContacts()">
        <td *ngIf="isTechnician" class="checkbox-cell">
          <input
            type="checkbox"
            [checked]="isContactSelected(c.id)"
            (change)="toggleContactSelection(c.id)"
          />
        </td>
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.nodes }}</td>
      </tr>

      <tr *ngIf="filteredContacts().length === 0">
        <td [attr.colspan]="isTechnician ? 5 : 4">No contacts found.</td>
      </tr>
    </tbody>
  </table>

  <div class="table-actions" *ngIf="isTechnician">
    <button
      class="delete-contact-btn"
      [disabled]="selectedContactIds.length === 0"
      (click)="openDeleteModal()"
    >
      Delete Contact
    </button>
  </div>

  <!-- add contact -->
  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal">
      <h3>New Contact</h3>

      <label>Email</label>
      <input
        type="text"
        placeholder="Enter your customer email"
        [(ngModel)]="newContact.email"
      />

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

      <div class="modal-btns">
        <button class="save" (click)="saveContact()">Save Contact</button>
        <button class="cancel" (click)="closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- delete confirm modal -->
  <div class="modal-backdrop" *ngIf="showDeleteModal">
    <div class="delete-modal">
      <p class="delete-text">Are you sure to delete this contact?</p>

      <div class="delete-modal-btns">
        <button class="cancel" (click)="closeDeleteModal()">Cancel</button>
        <button class="delete" (click)="confirmDeleteSelectedContacts()">
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
