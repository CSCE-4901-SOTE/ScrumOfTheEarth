<div class="page">
  <div class="card">
    <!--profile image -->
    <div class="left">
      <div class="avatar-wrap">
        <div class="avatar" [class.has-image]="!!profileImageUrl">
          <ng-container *ngIf="profileImageUrl; else placeholder">
            <img [src]="profileImageUrl" alt="Profile" />
          </ng-container>

          <ng-template #placeholder>
            <!-- user icon-->
            <svg viewBox="0 0 128 128" aria-hidden="true">
              <circle cx="64" cy="64" r="60" fill="none" stroke="black" stroke-width="6"></circle>
              <circle cx="64" cy="48" r="18" fill="none" stroke="black" stroke-width="6"></circle>
              <path
                d="M34 102c6-18 20-26 30-26s24 8 30 26"
                fill="none"
                stroke="black"
                stroke-width="6"
                stroke-linecap="round"
              ></path>
            </svg>
          </ng-template>
        </div>

        <label class="edit-pic">
          Edit Profile Picture
          <input type="file" accept="image/*" (change)="onPickImage(fileInput)" #fileInput />
        </label>
      </div>
    </div>

    <!--form -->
    <div class="right">
      <form class="form" (ngSubmit)="onSave()">
        <div class="field">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="fullName" name="fullName" />
        </div>

<div class="field">
          <label>Your Farm</label>
          <input type="text" [(ngModel)]="farm" name="farm" />
        </div>

        <div class="field">
          <label>Email</label>
          <input type="text" [value]="email" name="email" readonly style="opacity:0.6;cursor:not-allowed" />
        </div>

        <div class="field">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="phone" name="phone" />
        </div>

        <div class="field">
          <label>User ID</label>
          <input type="text" [value]="userId" name="userId" readonly style="opacity:0.6;cursor:not-allowed" />
        </div>

        <div *ngIf="saveMessage" style="color:green;font-size:14px;margin-bottom:8px">{{ saveMessage }}</div>
        <div *ngIf="saveError" style="color:red;font-size:14px;margin-bottom:8px">{{ saveError }}</div>

        <div class="actions">
          <button type="submit" class="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
