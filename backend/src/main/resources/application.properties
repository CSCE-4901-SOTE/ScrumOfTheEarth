spring.application.name=FarmRa

spring.datasource.url=jdbc:postgresql://${DB_IP}/${DB_NAME}?sslmode=require&prepareThreshold=0

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.schema=${DB_SCHEMA}

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.open-in-view=false

# Hibernate config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=5000
app.jwt.secret=9fN3sRkW2vQ8mZp1Lx7cA0tY4Hh6JkUeB3dG5nTqP1wS8xZ2
app.jwt.expMinutes=120